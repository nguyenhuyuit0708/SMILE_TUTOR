<!doctype html>
<html lang="vi">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chi tiết bài học</title>
  <link rel="icon" type="image/png" href="/image/icons_application/S_favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">
  <nav class="bg-white shadow-sm p-4 flex justify-between items-center px-8 border-b shrink-0">
    <h1 class="text-2xl font-black brand-title"><a href="/" style="color:inherit;text-decoration:none">SMILE COURSE</a>
    </h1>
    <div class="flex items-center space-x-4">
      <span id="welcomeMsg" class="font-medium text-gray-700"></span>
      <button onclick="logout()" class="text-red-500 hover:text-red-700 text-sm font-bold">ĐĂNG XUẤT</button>
    </div>
  </nav>

  <main class="max-w-7xl w-full mx-auto p-4 md:p-8 flex-1 grid grid-cols-1 lg:grid-cols-4 gap-8">

    <!-- Left Sidebar (Col span 1) -->
    <div class="lg:col-span-1 flex flex-col gap-6">
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 flex-1 max-h-[80vh] overflow-y-auto">
        <h3 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">Nội dung bài học</h3>
        <div id="contentList" class="space-y-3">
          <p class="text-gray-500 italic text-sm">Đang tải dữ liệu...</p>
        </div>
      </div>

      <!-- Admin Upload Section -->
      <div id="adminUploadArea" class="bg-blue-50 border border-blue-100 rounded-2xl p-5 hidden shrink-0">
        <h3 class="text-md font-bold text-blue-800 mb-2">Tải tài liệu lên</h3>
        <input type="file" id="uploadFileInput" class="block w-full text-xs text-gray-500
          file:mr-3 file:py-1.5 file:px-3
          file:rounded file:border-0
          file:text-xs file:font-semibold
          file:bg-blue-600 file:text-white
          hover:file:bg-blue-700 cursor-pointer
          border border-gray-300 rounded bg-white mb-3
        " />
        <button id="uploadBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded shadow-sm text-sm transition-colors">
          Tải lên ngay
        </button>
        <p id="uploadStatus" class="mt-2 text-xs text-gray-600 hidden text-center">Đang tải lên...</p>
      </div>
    </div>

    <!-- Right Viewer (Col span 3) -->
    <div class="lg:col-span-3 flex flex-col">
      <div class="mb-4 shrink-0">
        <h2 id="lessonTitle" class="text-2xl font-black text-gray-900 mb-1">Đang tải...</h2>
        <p class="text-sm text-gray-500">Trang chủ / Danh sách bài học / <span id="breadcrumbLesson"
            class="font-medium">...</span></p>
      </div>

      <div
        class="bg-white rounded-2xl shadow-sm border border-gray-100 p-2 md:p-4 flex-1 flex flex-col items-center justify-center relative min-h-[500px]"
        id="viewerArea">
        <div class="text-center text-gray-400" id="viewerPlaceholder">
          <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z">
            </path>
          </svg>
          <p class="font-medium text-gray-500">Vui lòng chọn một nội dung bên trái để xem</p>
        </div>
      </div>
    </div>

  </main>

  <script>
    const token = localStorage.getItem( 'myToken' );
    if ( !token ) { window.location.href = '/login.html'; }
    let payload = {};
    try { payload = JSON.parse( atob( token.split( '.' )[ 1 ] ) ); } catch ( e ) {}

    document.getElementById( 'welcomeMsg' ).innerText = `Chào mừng, ${payload.username || ''}`;

    const params = new URLSearchParams( location.search );
    const lessonId = params.get( 'id' );

    if ( !lessonId ) {
      document.getElementById( 'contentList' ).innerHTML = '<p class="text-red-500 text-sm">Thiếu ID bài học.</p>';
    }

    async function loadLesson() {
      if ( !lessonId ) return;

      try {
        const res = await fetch( '/api/folders/id/' + lessonId );
        if ( !res.ok ) {
          document.getElementById( 'lessonTitle' ).innerText = 'Không tìm thấy bài học';
          return;
        }
        const lesson = await res.json();
        document.getElementById( 'lessonTitle' ).innerText = lesson.name;
        document.getElementById( 'breadcrumbLesson' ).innerText = lesson.name;

        if ( payload.role === 'admin' ) {
          document.getElementById( 'adminUploadArea' ).classList.remove( 'hidden' );
        }

        loadFiles();
      } catch ( err ) {
        console.error( 'Error loading lesson', err );
      }
    }

    async function loadFiles() {
      try {
        const res = await fetch( '/api/folders/' + lessonId + '/files' );
        const files = await res.json();
        const container = document.getElementById( 'contentList' );

        if ( files.length === 0 ) {
          container.innerHTML = '<p class="text-gray-500 italic text-sm">Chưa có nội dung.</p>';
          return;
        }

        container.innerHTML = files.map( f => {
          const ext = f.originalName.split( '.' ).pop().toLowerCase();
          const iconVideo = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
          const iconImage = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`;
          const iconPdf = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>`;
          const iconFile = `<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`;

          let icon = iconFile;
          if ( [ 'mp4', 'mkv', 'avi', 'mov' ].includes( ext ) ) icon = iconVideo;
          if ( [ 'jpg', 'png', 'jpeg', 'gif' ].includes( ext ) ) icon = iconImage;
          if ( [ 'pdf' ].includes( ext ) ) icon = iconPdf;

          const lastDotIndex = f.originalName.lastIndexOf( '.' );
          const displayName = lastDotIndex !== -1 ? f.originalName.substring( 0, lastDotIndex ) : f.originalName;

          const adminMenu = payload.role === 'admin' ? `
                <div class="relative group/menu ml-auto z-10 hover:z-50" onclick="event.stopPropagation()">
                    <button class="w-8 h-8 flex items-center justify-center rounded-full text-gray-400 hover:text-gray-700 hover:bg-gray-200 opacity-0 group-hover:opacity-100 transition-opacity">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"/></svg>
                    </button>
                    <div class="absolute right-0 mt-1 w-36 bg-white rounded-md shadow-lg border border-gray-100 z-50 invisible opacity-0 transition-all duration-200 delay-500 group-hover/menu:visible group-hover/menu:opacity-100 group-hover/menu:delay-0">
                        <button onclick="renameFile('${f._id}', '${displayName.replace(/'/g, "\\'").replace(/"/g, "&quot;")}', '${ext}')" class="w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 rounded-t-md font-medium border-b border-gray-100">Đổi tên</button>
                        <button onclick="deleteFile('${f._id}')" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-b-md font-medium">Xóa tài liệu</button>
                    </div>
                </div>` : '';

          return `
                <div class="flex items-center gap-3 p-3 border border-gray-100 rounded-lg hover:bg-blue-50 transition-colors cursor-pointer group relative" onclick="viewFile('${f.fileName}', '${ext}', '${f.originalName}')">
                    <div class="w-10 h-10 flex-shrink-0 bg-blue-100 text-blue-600 rounded-md flex items-center justify-center text-lg group-hover:bg-blue-600 group-hover:text-white transition-colors">
                        ${icon}
                    </div>
                    <div class="overflow-hidden flex-1">
                        <p class="font-bold text-gray-800 text-sm truncate" title="${displayName.replace(/'/g, "\\'").replace(/"/g, "&quot;")}">${displayName.replace(/'/g, "\\'").replace(/"/g, "&quot;")}</p>
                        <p class="text-xs text-gray-500">${new Date( f.uploadDate ).toLocaleDateString()}</p>
                    </div>
                    ${adminMenu}
                </div>
                `;
        } ).join( '' );
      } catch ( err ) {
        console.error( 'Error loading files', err );
      }
    }

    window.renameFile = async function(fileId, currentName, ext) {
      const newName = prompt('Nhập tên mới cho tài liệu (không cần nhập đuôi):', currentName);
      if (!newName || newName.trim() === '' || newName === currentName) return;
      
      const fullNewName = ext && ext !== currentName ? newName.trim() + '.' + ext : newName.trim();
      try {
        const res = await fetch('/api/files/' + fileId + '/name', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ originalName: fullNewName })
        });
        if (res.ok) {
            loadFiles();
        } else {
            alert('Lỗi đổi tên tài liệu: ' + await res.text());
        }
      } catch (err) { alert('Lỗi kết nối'); }
    };

    window.deleteFile = async function ( fileId ) {
      if ( !confirm( 'Bạn có chắc chắn muốn xóa tài liệu này?' ) ) return;
      try {
        const res = await fetch( '/api/files/' + fileId, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } } );
        if ( res.ok ) {
          loadFiles();
          document.getElementById( 'viewerArea' ).innerHTML = `
                  <div class="text-center text-gray-400" id="viewerPlaceholder">
                    <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    <p class="font-medium text-gray-500">Vui lòng chọn một nội dung bên trái để xem</p>
                  </div>`;
          document.getElementById( 'viewerArea' ).classList.add( 'items-center', 'justify-center' );
        } else {
          alert( 'Lỗi xóa tài liệu' );
        }
      } catch ( err ) { alert( 'Lỗi kết nối' ); }
    };

    window.viewFile = function ( fileName, ext, originalName ) {
      const viewerArea = document.getElementById( 'viewerArea' );
      const url = `/download/${fileName}`;

      let contentHtml = '';
      if ( [ 'mp4', 'webm', 'ogg' ].includes( ext ) ) {
        contentHtml = `
              <div class="w-full h-full bg-black rounded-xl overflow-hidden flex flex-col">
                <video controls class="w-full h-full outline-none" autoplay>
                  <source src="${url}" type="video/${ext}">
                  Trình duyệt của bạn không hỗ trợ video.
                </video>
              </div>`;
      } else if ( [ 'jpg', 'jpeg', 'png', 'gif' ].includes( ext ) ) {
        contentHtml = `<img src="${url}" class="max-w-full max-h-full object-contain rounded-xl" />`;
      } else if ( [ 'pdf' ].includes( ext ) ) {
        contentHtml = `<iframe src="${url}" class="w-full h-full rounded-xl" frameborder="0"></iframe>`;
      } else {
        contentHtml = `
              <div class="text-center text-gray-600 flex flex-col items-center">
                <div class="text-6xl mb-4">x</div>
                <p class="mb-6 font-medium text-lg">Định dạng tệp này không hỗ trợ xem trực tiếp trên trình duyệt.</p>
                <a href="${url}" download="${originalName}" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-bold shadow-md transition-colors">Tải về máy để xem</a>
              </div>`;
      }

      viewerArea.innerHTML = contentHtml;
      viewerArea.classList.remove( 'items-center', 'justify-center' );
    };

    // Upload logic
    const uploadBtn = document.getElementById( 'uploadBtn' );
    const uploadFileInput = document.getElementById( 'uploadFileInput' );
    const uploadStatus = document.getElementById( 'uploadStatus' );

    uploadBtn.addEventListener( 'click', async () => {
      if ( !uploadFileInput.files.length ) return alert( 'Vui lòng chọn tệp.' );

      const fd = new FormData();
      fd.append( 'myFile', uploadFileInput.files[ 0 ] );
      fd.append( 'folderId', lessonId );

      uploadBtn.disabled = true;
      uploadStatus.classList.remove( 'hidden' );

      try {
        const res = await fetch( '/upload', { method: 'POST', headers: { 'Authorization': 'Bearer ' + token }, body: fd } );
        if ( res.ok ) {
          alert( 'Tải lên thành công!' );
          uploadFileInput.value = '';
          loadFiles();
        } else {
          alert( 'Lỗi: ' + await res.text() );
        }
      } catch ( err ) {
        alert( 'Lỗi kết nối.' );
      } finally {
        uploadBtn.disabled = false;
        uploadStatus.classList.add( 'hidden' );
      }
    } );

    function logout() { localStorage.removeItem( 'myToken' ); window.location.href = '/login.html'; }

    loadLesson();
  </script>

  <!-- Footer -->
  <footer class="bg-gray-900 text-gray-400 py-12 text-center">
      <div class="max-w-7xl mx-auto px-4">
          <div class="flex items-center justify-center gap-2 mb-4">
              <img src="/image/icons_application/S_favicon.png" alt="Logo" class="w-8 h-8 opacity-75"
                  onerror="this.style.display='none'">
              <span class="text-white font-bold text-xl tracking-wider">SMILE COURSE</span>
          </div>
          <p>&copy; 2026 Trung tâm gia sư SMILE. Tất cả quyền được bảo lưu.</p>
      </div>
  </footer>
</body>

</html>
